<VirtualHost *:80>
    ServerName _default_
    DocumentRoot /var/www/prototype-v2/frontend

    <Directory /var/www/prototype-v2/frontend>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:3000/api
    ProxyPassReverse /api http://127.0.0.1:3000/api

    ErrorLog ${APACHE_LOG_DIR}/prototype-v2-error.log
    CustomLog ${APACHE_LOG_DIR}/prototype-v2-access.log combined
</VirtualHost>
